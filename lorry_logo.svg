<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="512" height="512">
  <defs>
    <!-- Cargo Box Gradient (Rich Royal Blue to Dark Blue) -->
    <linearGradient id="cargo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A3FF"/>
      <stop offset="100%" stop-color="#0055D0"/>
    </linearGradient>
    
    <!-- Cabin Gradient (Vibrant Cyan to Bright Blue) -->
    <linearGradient id="cabin-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3CD0FF"/>
      <stop offset="100%" stop-color="#0080FF"/>
    </linearGradient>
    
    <!-- Windshield Glass Gradient (Dark Navy Slate) -->
    <linearGradient id="glass-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    
    <!-- Tyre Gradient (3D Slate Grey to Black) -->
    <linearGradient id="tyre-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    
    <!-- Wheel Hub Gradient (Silver metallic) -->
    <linearGradient id="hub-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
  </defs>
  
  <!-- Chassis / Undercarriage -->
  <rect x="6" y="21.5" width="20" height="2" rx="1" fill="#1E293B"/>
  
  <!-- Cargo Box (Right Side) -->
  <rect x="11.5" y="6.5" width="18.5" height="16" rx="2.5" fill="url(#cargo-grad)"/>
  
  <!-- Cabin (Left Side, facing Left) -->
  <path d="M 12,10.5 
           L 8,10.5 
           C 7,10.5 6.2,11.2 5.5,12.5 
           L 3.2,16.5 
           C 2.5,17.8 2.5,19 2.5,20 
           L 2.5,21.5 
           C 2.5,22.2 3.1,22.8 3.8,22.8 
           L 12,22.8 
           Z" 
        fill="url(#cabin-grad)"/>
  
  <!-- Windshield / Window -->
  <path d="M 9.5,12.5 
           L 7.8,12.5 
           C 7.4,12.5 7.1,12.7 6.8,13.2 
           L 5.2,16.2 
           C 4.9,16.8 5.1,17.5 5.7,17.5 
           L 9.5,17.5 
           Z" 
        fill="url(#glass-grad)"/>
        
  <!-- Windshield Reflection Glare -->
  <path d="M 8.5,13.2 
           L 7.7,13.2 
           L 6.2,16.2 
           L 7.0,16.2 
           Z" 
        fill="#FFFFFF" 
        opacity="0.25"/>
  
  <!-- Front Bumper -->
  <rect x="2" y="21.5" width="1.2" height="1.3" rx="0.4" fill="#6B7280"/>
  
  <!-- Rear Reflector -->
  <rect x="29" y="18" width="1" height="2" rx="0.5" fill="#EF4444"/>
  
  <!-- Wheel 1 (Front / Left) -->
  <circle cx="7.5" cy="24" r="4.2" fill="url(#tyre-grad)"/>
  <circle cx="7.5" cy="24" r="2.4" fill="url(#hub-grad)"/>
  <circle cx="7.5" cy="24" r="0.9" fill="#F9FAFB"/>
  
  <!-- Wheel 2 (Rear / Right) -->
  <circle cx="24.5" cy="24" r="4.2" fill="url(#tyre-grad)"/>
  <circle cx="24.5" cy="24" r="2.4" fill="url(#hub-grad)"/>
  <circle cx="24.5" cy="24" r="0.9" fill="#F9FAFB"/>
</svg>
