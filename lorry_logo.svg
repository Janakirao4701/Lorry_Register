<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 32" width="512" height="512">
  <defs>
    <linearGradient id="light-beam" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFF8C2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFF8C2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g transform="scale(-1,1) translate(-40,0)">
    <!-- Light Beam Cone -->
    <polygon points="31.5,16.5 38.5,11.5 38.5,22.5 31.5,17.5" fill="url(#light-beam)" opacity="0.35"/>
    
    <!-- Light Rays (fading out using the same gradient) -->
    <line x1="31.5" y1="16.5" x2="38.5" y2="12" stroke="url(#light-beam)" stroke-width="0.8"/>
    <line x1="31.5" y1="17" x2="39.5" y2="17" stroke="url(#light-beam)" stroke-width="0.8"/>
    <line x1="31.5" y1="17.5" x2="38.5" y2="22" stroke="url(#light-beam)" stroke-width="0.8"/>
    
    <!-- Lorry Body -->
    <rect x="1" y="10" width="20" height="13" rx="1.5" fill="#E8F0F7" stroke="#BFC8D4" stroke-width="0.5"/>
    <rect x="1" y="10" width="20" height="3.5" rx="1.5" fill="#C8D8E8"/>
    <rect x="3" y="14" width="16" height="5" rx="1" fill="#F5C842"/>
    <rect x="21" y="12" width="10" height="11" rx="1.5" fill="#2563A8"/>
    <rect x="24" y="12" width="7" height="6" rx="1" fill="#A8CFF0" opacity="0.9"/>
    <rect x="21" y="21" width="10" height="2" fill="#F5C842"/>
    <rect x="30" y="14" width="1.5" height="7" rx="0.5" fill="#1A3A5C"/>
    <rect x="30" y="16" width="1.5" height="2" rx="0.3" fill="#FFF8C2"/>
    
    <!-- 3-Axle Wheels with hub caps -->
    <circle cx="7" cy="25" r="3.5" fill="#222C36"/>
    <circle cx="7" cy="25" r="2" fill="#3A4550"/>
    <circle cx="7" cy="25" r="0.8" fill="#E8F0F7"/>
    <circle cx="16" cy="25" r="3.5" fill="#222C36"/>
    <circle cx="16" cy="25" r="2" fill="#3A4550"/>
    <circle cx="16" cy="25" r="0.8" fill="#E8F0F7"/>
    <circle cx="27" cy="25" r="3.5" fill="#222C36"/>
    <circle cx="27" cy="25" r="2" fill="#3A4550"/>
    <circle cx="27" cy="25" r="0.8" fill="#E8F0F7"/>
  </g>
</svg>
